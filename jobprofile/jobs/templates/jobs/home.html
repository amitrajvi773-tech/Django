{% extends 'jobs/base.html' %}
{% block content %}

<h1>Available Jobs</h1>

{% for job in jobs %}
<div class="card">
    <h2>{{ job.title }}</h2>
    <p><strong>Company:</strong> {{ job.company_name }}</p>
    <p><strong>Location:</strong> {{ job.location }}</p>
    <a href="{% url 'job_detail' job.id %}">
        <button>View Details</button>
    </a>
</div>
{% empty %}
<p>No jobs available.</p>
{% endfor %}

{% endblock %}
