{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>RecordBook</title>
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body>

    <nav class="navbar">
        <h1>📘 RecordBook</h1>

        <div>
            <a href="/">Home</a>

            {% if user.is_authenticated %}
                <span>Welcome {{ user.username }}</span>
                <a href="/logout/">Logout</a>
            {% else %}
                <a href="/login/">Login</a>
                <a href="/register/">Register</a>
            {% endif %}
        </div>
    </nav>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

</body>
</html>
