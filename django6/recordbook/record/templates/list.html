{% extends 'layout.html' %}

{% block content %}
<h2>All Records</h2>

{% for r in records %}
<div class="card">
    <p><strong>Name:</strong> {{ r.name }}</p>
    <p><strong>Roll:</strong> {{ r.roll }}</p>
    <p><strong>Email:</strong> {{ r.email }}</p>

    <a href="/edit/{{r.id}}/"><button>Edit</button></a>
    <a href="/delete/{{r.id}}/"><button>Delete</button></a>
</div>
{% empty %}
<p>No records found.</p>
{% endfor %}

{% endblock %}
