{% comment %} {% extends 'records/layout.html' %} {% endcomment %}
{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Login | RecordBook</title>
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body>

<div class="auth-container">

    <div class="auth-card">
        <h2>Login</h2>

        <!-- Django Messages -->
        {% if messages %}
            {% for message in messages %}
                <p class="error">{{ message }}</p>
            {% endfor %}
        {% endif %}

        <!-- Error from view -->
        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}

        <form method="post" autocomplete="off">
            {% csrf_token %}

            <input type="text"
                   name="username"
                   placeholder="Enter Username"
                   autocomplete="off"
                   required>

            <input type="password"
                   name="password"
                   placeholder="Enter Password"
                   autocomplete="new-password"
                   required>

            <button type="submit">Login</button>
        </form>

        <p class="auth-link">
            No account?
            <a href="{% url 'register' %}">Register</a>
        </p>

    </div>

</div>

</body>
</html>
