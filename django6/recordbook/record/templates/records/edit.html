{% extends 'records/layout.html' %}

{% block content %}
<h2>Edit Record</h2>

<form method="post">
    {% csrf_token %}
    <input type="text" name="name" value="{{record.name}}" required>
    <input type="number" name="roll" value="{{record.roll}}" required>
    <input type="email" name="email" value="{{record.email}}" required>
    <button type="submit">Update Record</button>
</form>

{% endblock %}
